<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Score Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Setup Screen ─────────────────────────────────────────────────── -->
  <div id="setup-screen" class="screen hidden">
    <div class="setup-wrap">
      <div class="setup-logo">&#9824;</div>
      <h1>Poker Score Note</h1>
      <p class="hint setup-hint">Set up a new game to get started.</p>

      <div class="card">
        <label class="field-label">Buy-in amount</label>
        <input id="setup-buyin" type="number" min="1" step="any" placeholder="e.g. 500" />

        <label class="field-label" style="margin-top:18px">Number of players</label>
        <input id="setup-count" type="number" min="2" max="20" step="1" placeholder="e.g. 4" />

        <div id="setup-names" class="hidden" style="margin-top:18px">
          <label class="field-label">Player names</label>
          <div id="name-inputs"></div>
        </div>
      </div>

      <button id="btn-generate-names" class="btn-secondary btn-full">Set Player Names</button>
      <button id="btn-start-game" class="btn-primary btn-full hidden">&#9654; Start Game</button>
    </div>
  </div>

  <!-- ── Game Screen ──────────────────────────────────────────────────── -->
  <div id="game-screen" class="screen hidden">
    <header>
      <div class="logo-text">
        <span class="suit">&#9824;</span>
        <span>Poker Score Note</span>
      </div>
      <span id="header-buyin" class="header-badge"></span>
    </header>

    <nav id="tabs">
      <button class="tab active" data-tab="game">&#127183; Game</button>
      <button class="tab" data-tab="settle">&#128176; Settle Up</button>
    </nav>

    <main>
      <!-- Game Tab -->
      <section id="tab-game" class="tab-panel active">
        <div id="player-cards"></div>
        <div class="card danger-zone">
          <button id="btn-reset" class="btn-danger">&#9646; End &amp; Reset Session</button>
        </div>
      </section>

      <!-- Settle Tab -->
      <section id="tab-settle" class="tab-panel">
        <div class="card">
          <h2>Final Breakdown</h2>
          <table id="details-table">
            <thead>
              <tr>
                <th>Player</th>
                <th>Buy-ins</th>
                <th>Invested</th>
                <th>Chips</th>
                <th>Net</th>
              </tr>
            </thead>
            <tbody id="details-body">
              <tr><td colspan="5" class="empty">No data yet.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="card">
          <h2>Who Pays Whom</h2>
          <ul id="transactions-list" class="item-list">
            <li class="empty">All square!</li>
          </ul>
        </div>

        <button id="btn-refresh-settle" class="btn-secondary btn-full">&#8635; Refresh</button>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
